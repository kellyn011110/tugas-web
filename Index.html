<html>
<head>
    <title>Pendaftaran</title>
    <link rel="stylesheet" href="bahanujian.css">
</head>
<body>

<form id="formku">
<div class="kotak">
    <h2>Input Data</h2>

    <label>Nama lengkap:</label>
    <input type="text" id="nama"placeholder="contoh:Muhammad Raihan">

    <label>Kelas:</label>
    <input type="text" id="kelas"placeholder="contoh:XII IPA2/11A/7B">

    <label>Pilih ekstrakurikuler (3 pilihan)</label>
    <div class="kotak3">
        <label><input type="checkbox" name="ekskul" value="Basket"> Basket</label><br>
		
        <label><input type="checkbox" name="ekskul" value="Futsal"> Futsal</label><br>
		
        <label><input type="checkbox" name="ekskul" value="Paduan Suara"> Paduan suara</label>
    </div>

    <label>Pilih jadwal belajar (wajib pilih salah satu)</label>
    <label>
	<div class="kotak4">
	<input type="radio" name="hari" value="Pagi"> Pagi (07.00-12.00)
	</label><br>
	
    <label>
	<input type="radio" name="hari" value="Siang"> Siang (12.30-17.00)
	</label><br>
	
    <label>
	<input type="radio" name="hari" value="Sore"> Sore (17.30-20.30)
	</label><br>
	
    <label>
	<input type="radio" name="hari" value="Campuran"> Campuran (fleksibel)
	</label><br>
	<br>
	</div>
	<button type="button" onclick="tampil()">Daftar sekarang</button>
    <button type="button" onclick="resetForm()">Reset Form</button>

    <div id="hasil">
        Data anda harus ditampilkan di sini...
    </div>
</div>
</form>

<script src="bahanujian.js"></script>
</body>
</html>
